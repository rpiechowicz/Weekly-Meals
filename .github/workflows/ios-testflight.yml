name: iOS TestFlight Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      PROJECT_PATH: weekly meals.xcodeproj
      SCHEME: weekly meals
      BUNDLE_ID: rpiechowicz.weekly-meals
      TEAM_ID: 5R874L3LNP
      ARCHIVE_PATH: ${{ github.workspace }}/build/weekly-meals.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26
        run: |
          # Prefer Xcode 26.x for iOS 26 SDK (required for Liquid Glass tab bar)
          xcode26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$xcode26" ]; then
            echo "Using $xcode26"
            sudo xcode-select -s "$xcode26/Contents/Developer"
          else
            echo "Xcode 26 not found, using default: $(xcode-select -p)"
          fi
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT_PATH"

      - name: Decode App Store Connect key
        id: appstore-key
        env:
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          key_dir="$RUNNER_TEMP/private_keys"
          key_path="$key_dir/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"
          mkdir -p "$key_dir"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | openssl base64 -d -A > "$key_path"
          echo "dir=$key_dir" >> "$GITHUB_OUTPUT"
          echo "path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Import code-signing certificates
        uses: apple-actions/import-codesign-certs@v5.0.3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Create export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive release build
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.appstore-key.outputs.path }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            clean archive \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export IPA
        run: |
          mkdir -p "$EXPORT_PATH"
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.appstore-key.outputs.path }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Locate exported IPA
        id: exported-ipa
        run: |
          ipa_path="$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "$ipa_path" ]; then
            echo "No exported .ipa found in $EXPORT_PATH" >&2
            exit 1
          fi
          echo "path=$ipa_path" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: weekly-meals-testflight-ipa
          path: ${{ steps.exported-ipa.outputs.path }}
          if-no-files-found: error

      - name: Upload build to TestFlight
        env:
          API_PRIVATE_KEYS_DIR: ${{ steps.appstore-key.outputs.dir }}
        run: |
          xcrun altool \
            --upload-app \
            -f "${{ steps.exported-ipa.outputs.path }}" \
            -t ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            --output-format json \
            --verbose
