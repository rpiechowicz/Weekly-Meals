name: iOS TestFlight Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      PROJECT_PATH: weekly meals.xcodeproj
      SCHEME: weekly meals
      BUNDLE_ID: rpiechowicz.weekly-meals
      TEAM_ID: 5R874L3LNP
      ARCHIVE_PATH: ${{ github.workspace }}/build/weekly-meals.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project "$PROJECT_PATH"

      - name: Decode App Store Connect key
        id: appstore-key
        env:
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | openssl base64 -d -A > "$key_path"
          {
            echo "path=$key_path"
            echo "content<<EOF"
            cat "$key_path"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Import code-signing certificates
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_P12_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Download App Store provisioning profile
        uses: apple-actions/download-provisioning-profiles@v4
        with:
          bundle-id: ${{ env.BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ steps.appstore-key.outputs.content }}

      - name: Create export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive release build
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.appstore-key.outputs.path }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" \
            clean archive \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export IPA
        run: |
          mkdir -p "$EXPORT_PATH"
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${{ steps.appstore-key.outputs.path }}" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Locate exported IPA
        id: exported-ipa
        run: |
          ipa_path="$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "$ipa_path" ]; then
            echo "No exported .ipa found in $EXPORT_PATH" >&2
            exit 1
          fi
          echo "path=$ipa_path" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-meals-testflight-ipa
          path: ${{ steps.exported-ipa.outputs.path }}
          if-no-files-found: error

      - name: Upload build to TestFlight
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ steps.exported-ipa.outputs.path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ steps.appstore-key.outputs.content }}
