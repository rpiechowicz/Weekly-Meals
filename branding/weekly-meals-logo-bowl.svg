<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 100 100">
  <title>Weekly Meals — Steaming Bowl (Cozy Kitchen v2)</title>
  <defs>
    <linearGradient id="lb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2a20"/>
      <stop offset="1" stop-color="#1a1411"/>
    </linearGradient>
    <linearGradient id="lb-bowl" x1="0" y1="0.56" x2="0" y2="0.80">
      <stop offset="0" stop-color="#eba569"/>
      <stop offset="1" stop-color="#a84c32"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="url(#lb-bg)"/>
  <!-- steam — three curls forming W shape -->
  <g stroke="#fbf3e8" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.92">
    <path d="M36 46 C32 40 40 36 36 28"/>
    <path d="M50 46 C46 40 54 36 50 26"/>
    <path d="M64 46 C60 40 68 36 64 28"/>
  </g>
  <!-- bowl rim -->
  <ellipse cx="50" cy="56" rx="30" ry="5" fill="#e8cf85"/>
  <!-- bowl body -->
  <path d="M22 56 Q22 78 50 80 Q78 78 78 56 Z" fill="url(#lb-bowl)"/>
  <!-- bowl shine -->
  <path d="M27 60 Q27 72 36 76" stroke="#fbf3e8" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.25"/>
</svg>
